<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROM 關節活動度測量 | 復健科臨床工具</title>
<link rel="stylesheet" href="style.css"></head>
<body><div class="wrap">
<a class="back" href="index.html">← 回工具箱首頁</a>
<h1>📐 ROM 關節活動度量角器紀錄</h1>
<div class="sub">上下肢主要關節活動度，左右側對照，可多次追蹤進步情形</div>
<div class="disclaimer">⚠️ 數值需由量角器（goniometer）實際測量輸入，本工具僅協助記錄與左右側／前後次比對，不可取代臨床檢查。</div>

<div class="card">
  <div class="section-title">關節動作</div>
  <div id="romList"></div>
</div>

<div class="card">
  <div class="section-title">📝 備註</div>
  <textarea id="notes" placeholder="測量日期、術後第幾週、特殊發現..."></textarea>
</div>

<div class="toolbar">
  <button class="action btn-primary" id="saveBtn">儲存本次測量</button>
  <button class="action btn-ghost" id="exportBtn">複製文字摘要</button>
  <button class="action btn-ghost" id="clearBtn">清除目前輸入</button>
</div>
<div class="saved-note" id="savedNote"></div>

<div class="card" style="display:none;" id="historyCard">
  <div class="section-title">🕓 歷史紀錄（可比對進步）</div>
  <div id="historyList"></div>
</div>
<footer>僅供醫療教育用途 · 資料不上傳伺服器 · 復健科 許雅筑醫師</footer>
</div>

<script src="common.js"></script>
<script>
const STORE_KEY = "rom_records_v1";
const MOTIONS = [
  {name:"肩屈曲 Shoulder Flexion", norm:"0-180°"},
  {name:"肩外展 Shoulder Abduction", norm:"0-180°"},
  {name:"肩外旋 Shoulder ER", norm:"0-90°"},
  {name:"肩內旋 Shoulder IR", norm:"0-70°"},
  {name:"肘屈曲 Elbow Flexion", norm:"0-150°"},
  {name:"腕背屈 Wrist Extension", norm:"0-70°"},
  {name:"髖屈曲 Hip Flexion", norm:"0-120°"},
  {name:"髖外展 Hip Abduction", norm:"0-45°"},
  {name:"膝屈曲 Knee Flexion", norm:"0-135°"},
  {name:"膝伸直 Knee Extension", norm:"0°（過伸異常）"},
  {name:"踝背屈 Ankle Dorsiflexion", norm:"0-20°"},
  {name:"踝蹠屈 Ankle Plantarflexion", norm:"0-50°"},
];

function buildUI(){
  const c = document.getElementById('romList');
  c.innerHTML = MOTIONS.map((m,i)=>`
    <div class="row">
      <div class="item-name">${m.name}<div class="item-sub">正常參考：${m.norm}</div></div>
      <div style="display:flex;gap:8px;">
        <div><div class="item-sub" style="text-align:center;">右 R</div><input type="number" id="R${i}" placeholder="°" style="width:70px;text-align:center;"></div>
        <div><div class="item-sub" style="text-align:center;">左 L</div><input type="number" id="L${i}" placeholder="°" style="width:70px;text-align:center;"></div>
      </div>
    </div>`).join('');
}

function summaryText(){
  const lines = [`ROM 關節活動度紀錄 - ${new Date().toLocaleString('zh-TW')}`];
  MOTIONS.forEach((m,i)=>{
    const r = document.getElementById('R'+i).value;
    const l = document.getElementById('L'+i).value;
    if(r || l){
      lines.push(`${m.name}：右 ${r||'-'}° / 左 ${l||'-'}°`);
    }
  });
  const notes = document.getElementById('notes').value.trim();
  if(notes) lines.push(`\n備註：${notes}`);
  return lines.join('\n');
}

buildUI();

document.getElementById('saveBtn').addEventListener('click', ()=>{
  rtSave(STORE_KEY, summaryText());
  rtFlash(document.getElementById('savedNote'), '已儲存到本機 ✓');
  rtRenderHistory(STORE_KEY, document.getElementById('historyList'));
});
document.getElementById('exportBtn').addEventListener('click', ()=>{
  rtCopy(summaryText(), document.getElementById('savedNote'));
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  MOTIONS.forEach((m,i)=>{ document.getElementById('R'+i).value=''; document.getElementById('L'+i).value=''; });
  document.getElementById('notes').value='';
});
rtRenderHistory(STORE_KEY, document.getElementById('historyList'));
</script>
</body></html>
